  intl: ^0.20.2
  tflite_flutter: ^0.12.1
  http: ^1.2.1
  ffmpeg_kit_flutter_new: ^4.3.2
  google_fonts: ^6.1.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/model/
    - assets/species/
    - assets/images/
