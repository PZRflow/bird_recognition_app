name: bird_recognition_app
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  record: ^7.1.0
  permission_handler: ^12.0.3
  path_provider: ^2.1.2
  fftea: ^1.5.0
  audioplayers: ^6.8.1
  avatar_glow: ^3.0.1
  file_selector: ^1.1.0
  sqflite: ^2.4.3
